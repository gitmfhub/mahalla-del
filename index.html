<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محله دِل - تسجيل ودخول العملاء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="store-header">
            <h1>🏪 محله دِل</h1>
            <p>أهلاً بك في متجرك المفضل</p>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">دخول</button>
                <button class="tab-btn" data-tab="register">تسجيل جديد</button>
            </div>

            <!-- نموذج الدخول -->
            <div id="login-form" class="form-container active">
                <h2>مرحباً بعودتك</h2>
                <form id="login">
                    <div class="input-group">
                        <label>📧 البريد الإلكتروني</label>
                        <input type="email" id="login-email" required placeholder="example@email.com">
                    </div>
                    <div class="input-group">
                        <label>🔒 كلمة المرور</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">دخول</button>
                </form>
            </div>

            <!-- نموذج التسجيل -->
            <div id="register-form" class="form-container">
                <h2>إنشاء حساب جديد</h2>
                <form id="register">
                    <div class="input-group">
                        <label>👤 الاسم الكامل</label>
                        <input type="text" id="reg-name" required placeholder="أحمد محمد">
                    </div>
                    <div class="input-group">
                        <label>📧 البريد الإلكتروني</label>
                        <input type="email" id="reg-email" required placeholder="example@email.com">
                    </div>
                    <div class="input-group">
                        <label>📱 رقم الجوال</label>
                        <input type="tel" id="reg-phone" required placeholder="05xxxxxxxx">
                    </div>
                    <div class="input-group">
                        <label>🔒 كلمة المرور</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label>🔒 تأكيد كلمة المرور</label>
                        <input type="password" id="reg-confirm" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">إنشاء حساب</button>
                </form>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
